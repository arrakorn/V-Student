<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบโหวตสภานักเรียน | V-Student</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shapes"></div>

    <div class="container">
        <div id="auth-section" class="card fade-in">
            <h1 id="auth-title">เข้าสู่ระบบ</h1>
            <p id="auth-subtitle">เพื่อร่วมโหวตสภานักเรียน</p>
            
            <form id="auth-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="อีเมล" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="รหัสผ่าน" required>
                </div>
                <button type="submit" class="btn-primary" id="auth-btn">เข้าสู่ระบบ</button>
            </form>
            
            <p class="toggle-text">
                <span id="toggle-hint">ยังไม่มีบัญชีใช่ไหม?</span> 
                <a href="#" id="toggle-auth">สมัครสมาชิกเลย</a>
            </p>
            <div id="auth-error" class="error-msg"></div>
        </div>

        <div id="vote-section" class="card fade-in hidden" style="max-width: 800px;">
            <div class="header">
                <h2>เลือกตั้งสภานักเรียน 🗳️</h2>
                <button id="logout-btn" class="btn-secondary">ออกจากระบบ</button>
            </div>
            <p id="user-display">ยินดีต้อนรับ</p>
            
            <div id="voting-area">
                <h3 class="vote-title">โปรดเลือกพรรคที่คุณชื่นชอบ</h3>
                <div class="candidates-grid">
                    <div class="candidate-card">
                        <div class="number-badge">1</div>
                        <h3>พรรคก้าวไกล(ในโรงเรียน)</h3>
                        <p>นโยบาย: พัฒนาโรงอาหาร เพิ่มเมนูน้ำปั่น</p>
                        <button class="btn-vote" data-id="party_1">โหวตเบอร์ 1</button>
                    </div>
                    <div class="candidate-card">
                        <div class="number-badge">2</div>
                        <h3>พรรคพลังนักเรียน</h3>
                        <p>นโยบาย: กีฬาสีจัดเต็ม เพิ่มวันหยุดหลังสอบ</p>
                        <button class="btn-vote" data-id="party_2">โหวตเบอร์ 2</button>
                    </div>
                </div>
                <div id="vote-status" class="success-msg hidden"></div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
