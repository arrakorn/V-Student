<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Council Vote 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <section id="login-section" class="card">
            <h1>🗳️ เข้าสู่ระบบโหวต</h1>
            <p>กรุณากรอกรหัสนักเรียนเพื่อดำเนินการ</p>
            <div class="input-group">
                <input type="text" id="student-id" placeholder="รหัสนักเรียน (เช่น 65xxx)" required>
                <button onclick="login()">เข้าสู่ระบบ</button>
            </div>
            <p id="login-error" class="error-msg"></p>
        </section>

        <section id="vote-section" class="card hidden">
            <h2>เลือกพรรคที่ใช่ เบอร์ที่ชอบ</h2>
            <div class="candidates-grid">
                <div class="candidate-card" onclick="castVote(1)">
                    <div class="number">01</div>
                    <h3>พรรคก้าวใหม่</h3>
                    <p>สโลแกน: พัฒนาโรงเรียนด้วยเทคโนโลยี</p>
                    <button class="btn-vote">โหวตเบอร์ 1</button>
                </div>
                <div class="candidate-card" onclick="castVote(2)">
                    <div class="number">02</div>
                    <h3>พรรครวมใจไทย</h3>
                    <p>สโลแกน: เน้นกิจกรรม สร้างสรรค์สังคม</p>
                    <button class="btn-vote">โหวตเบอร์ 2</button>
                </div>
            </div>
            <button class="logout-link" onclick="location.reload()">ออกจากระบบ</button>
        </section>

        <section id="success-section" class="card hidden">
            <div class="success-icon">✅</div>
            <h2>บันทึกคะแนนเรียบร้อย!</h2>
            <p>ขอบคุณที่ใช้สิทธิ์เลือกตั้งสภานักเรียน</p>
            <button onclick="location.reload()">กลับหน้าหลัก</button>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
