<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเลือกตั้งสภานักเรียน | CTED CHANDRA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-shapes"></div>

    <div class="container">
        <div id="auth-section" class="card active-slide">
            <div class="header">
                <h2>🗳️ ระบบเลือกตั้งสภานักเรียน</h2>
                <p>CTED CHANDRA</p>
            </div>
            
            <div class="form-group">
                <label for="student-id">รหัสนักเรียน</label>
                <input type="text" id="student-id" placeholder="กรอกรหัสนักเรียนของคุณ" required>
            </div>
            <div class="form-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" id="password" placeholder="ตั้งรหัสผ่าน / กรอกรหัสผ่าน" required>
            </div>
            
            <div class="action-buttons">
                <button id="btnLogin" class="btn primary">เข้าสู่ระบบ</button>
                <button id="btnRegister" class="btn secondary">สมัครสมาชิกลงเสียง</button>
            </div>
            <p id="auth-message" class="message"></p>
        </div>

        <div id="voting-section" class="card hidden">
            <div class="header">
                <h2>ยินดีต้อนรับ, ผู้มีสิทธิเลือกตั้ง!</h2>
                <p>กรุณาเลือกผู้สมัครที่คุณไว้วางใจเพียง 1 พรรค</p>
            </div>

            <div class="candidates-grid">
                <div class="candidate-card">
                    <div class="candidate-img number-1">เบอร์ 1</div>
                    <h3>พรรคก้าวหน้าพัฒนา</h3>
                    <button class="btn vote-btn" data-candidate="1">โหวตเบอร์ 1</button>
                </div>
                <div class="candidate-card">
                    <div class="candidate-img number-2">เบอร์ 2</div>
                    <h3>พรรครวมใจเพื่อเรา</h3>
                    <button class="btn vote-btn" data-candidate="2">โหวตเบอร์ 2</button>
                </div>
            </div>

            <div class="logout-section">
                <button id="btnLogout" class="btn danger">ออกจากระบบ</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
